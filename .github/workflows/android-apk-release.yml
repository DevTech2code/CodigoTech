name: Build and Publish Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - lib/**
      - android/**
      - pubspec.yaml
      - pubspec.lock
      - .github/workflows/android-apk-release.yml

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CI_KEY_ALIAS: codigotech
      CI_KEYSTORE_PATH: android/ci-signing/codigotech-upload.jks
      CI_KEYSTORE_PASSWORD_FILE: android/ci-signing/keystore.password

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Restore CI signing keystore
        uses: actions/cache@v4
        with:
          path: android/ci-signing
          key: codigotech-ci-signing-v1

      - name: Prepare CI signing files
        shell: bash
        run: |
          mkdir -p android/ci-signing

          if [ ! -f "$CI_KEYSTORE_PASSWORD_FILE" ]; then
            openssl rand -hex 24 > "$CI_KEYSTORE_PASSWORD_FILE"
          fi

          KEY_PASS=$(cat "$CI_KEYSTORE_PASSWORD_FILE")

          if [ ! -f "$CI_KEYSTORE_PATH" ]; then
            keytool -genkeypair -v \
              -keystore "$CI_KEYSTORE_PATH" \
              -alias "$CI_KEY_ALIAS" \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -storepass "$KEY_PASS" \
              -keypass "$KEY_PASS" \
              -dname "CN=CodigoTech, OU=Mobile, O=CodigoTech, L=Santo Domingo, S=Distrito Nacional, C=DO"
          fi

          cat > android/key.properties <<EOF
          storePassword=$KEY_PASS
          keyPassword=$KEY_PASS
          keyAlias=$CI_KEY_ALIAS
          storeFile=ci-signing/codigotech-upload.jks
          EOF

      - name: Build release APK
        run: flutter build apk --release

      - name: Extract app version
        id: app_version
        run: |
          VERSION_LINE=$(grep -m1 '^version:' pubspec.yaml | sed 's/version:[[:space:]]*//')
          APP_VERSION="$VERSION_LINE"
          APP_BUILD="0"

          if [[ "$VERSION_LINE" == *"+"* ]]; then
            APP_VERSION="${VERSION_LINE%%+*}"
            APP_BUILD="${VERSION_LINE##*+}"
          fi

          echo "version=$APP_VERSION" >> "$GITHUB_OUTPUT"
          echo "build=$APP_BUILD" >> "$GITHUB_OUTPUT"

      - name: Prepare release artifacts
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk dist/CodigoTech-latest.apk
          sha256sum dist/CodigoTech-latest.apk > dist/CodigoTech-latest.apk.sha256

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: CodigoTech-latest-apk
          path: |
            dist/CodigoTech-latest.apk
            dist/CodigoTech-latest.apk.sha256

      - name: Publish GitHub release asset
        uses: ncipollo/release-action@v1
        with:
          tag: apk-latest
          name: CodigoTech APK Latest v${{ steps.app_version.outputs.version }}+${{ steps.app_version.outputs.build }}
          body: |
            Version: v${{ steps.app_version.outputs.version }}
            Build: ${{ steps.app_version.outputs.build }}

            Descarga directa del APK:
            https://github.com/${{ github.repository }}/releases/download/apk-latest/CodigoTech-latest.apk

            Este archivo se actualiza automaticamente con cada push a main.
          allowUpdates: true
          replacesArtifacts: true
          removeArtifacts: true
          artifacts: |
            dist/CodigoTech-latest.apk
            dist/CodigoTech-latest.apk.sha256
          token: ${{ secrets.GITHUB_TOKEN }}
